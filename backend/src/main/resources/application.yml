spring:
  application:
    name: library

  data:
    mongodb:
      uri: mongodb://localhost:27017/librarydb
      auto-index-creation: true

  graphql:
    websocket:
      path: /graphql
    graphiql:
      enabled: false   # served by the React frontend at /graphiql instead

  # Enable multipart file uploads (Spring WebFlux)
  webflux:
    multipart:
      max-in-memory-size: 5MB
      max-disk-usage-per-part: 5MB
      max-parts: 1

server:
  port: 8080

# Directory (relative to working dir) where book cover images are stored
app:
  upload:
    dir: uploads/books
  jwt:
    # Base64-encoded HS256 key (32 bytes).
    # CHANGE THIS in any non-development environment.
    secret: bGlicmFyeS1hcHAtc2VjcmV0LWtleS0zMmJ5dGVzISE=
    expiration-ms: 86400000   # 24 hours

# Log levels are configured in logback-spring.xml (wide-event structured logging).
# Set the active Spring profile to "dev" to enable DEBUG for com.example.
