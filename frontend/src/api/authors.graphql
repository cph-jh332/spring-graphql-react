query GetAuthors($query: String) {
  authors(query: $query) {
    id
    name
    books {
      id
      title
      year
    }
  }
}

query GetAuthor($id: ID!) {
  author(id: $id) {
    id
    name
    books {
      id
      title
      year
    }
  }
}

subscription OnAuthorAdded {
  authorAdded {
    id
    name
  }
}

subscription OnAuthorDeleted {
  authorDeleted
}
