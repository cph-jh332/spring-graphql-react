query GetBooks($query: String) {
  books(query: $query) {
    id
    title
    year
    coverImage
    totalCopies
    availableCount
    author {
      id
      name
    }
  }
}

query GetBook($id: ID!) {
  book(id: $id) {
    id
    title
    year
    coverImage
    totalCopies
    availableCount
    author {
      id
      name
    }
  }
}

subscription OnBookAdded {
  bookAdded {
    id
    title
    year
    coverImage
    totalCopies
    availableCount
    author {
      id
      name
    }
  }
}

subscription OnBookDeleted {
  bookDeleted
}

