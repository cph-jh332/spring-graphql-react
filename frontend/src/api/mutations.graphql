mutation AddBook($input: BookInput!) {
  addBook(input: $input) {
    id
    title
    year
    author {
      id
      name
    }
  }
}

mutation DeleteBook($id: ID!) {
  deleteBook(id: $id)
}

mutation AddAuthor($input: AuthorInput!) {
  addAuthor(input: $input) {
    id
    name
  }
}

mutation DeleteAuthor($id: ID!) {
  deleteAuthor(id: $id)
}
