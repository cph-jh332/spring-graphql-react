mutation AddBook($input: BookInput!) {
  addBook(input: $input) {
    id
    title
    year
    totalCopies
    availableCount
    author {
      id
      name
    }
  }
}

mutation UpdateBook($id: ID!, $input: BookInput!) {
  updateBook(id: $id, input: $input) {
    id
    title
    year
    totalCopies
    availableCount
    author {
      id
      name
    }
  }
}

mutation DeleteBook($id: ID!) {
  deleteBook(id: $id)
}

mutation BorrowBook($bookId: ID!) {
  borrowBook(bookId: $bookId) {
    id
    totalCopies
    availableCount
  }
}

mutation ReturnBook($bookId: ID!) {
  returnBook(bookId: $bookId) {
    id
    totalCopies
    availableCount
  }
}

mutation AddAuthor($input: AuthorInput!) {
  addAuthor(input: $input) {
    id
    name
  }
}

mutation DeleteAuthor($id: ID!) {
  deleteAuthor(id: $id)
}

mutation Login($input: LoginInput!) {
  login(input: $input) {
    username
    roles
    borrowedRecords {
      bookId
      borrowedAt
    }
  }
}

mutation Logout {
  logout
}

